<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/skeleton/2.0.4/skeleton.min.css">
  <link rel="stylesheet" href="/public/style.css">
</head>
<body>
  <div class="container" style="max-width: 400px; margin-top: 50px;">
    <h3>Crear cuenta</h3>

    <form id="registerForm">
      <label for="username">Nombre de usuario</label>
      <input type="text" name="username" id="username" placeholder="Tu nombre" required>

      <label for="email">Correo</label>
      <input type="email" name="email" id="email" placeholder="correo@example.com" required>

      <label for="password">Contraseña</label>
      <input type="password" name="password" id="password" placeholder="********" required>

      <button class="button-primary u-full-width" type="submit">Registrarse</button>
    </form>

    <!-- Contenedor de mensajes -->
    <div id="messageContainer" style="margin-top: 15px;"></div>

    <p style="margin-top: 10px;">
      ¿Ya tienes cuenta? <a href="/index.html">Inicia sesión aquí</a>
    </p>
  </div>

  <script src="/js/script.js"></script>
</body>
</html>
